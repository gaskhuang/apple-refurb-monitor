name: Apple 整修品監控

on:
  schedule:
    - cron: '*/5 * * * *'  # 每 5 分鐘執行一次（GitHub Actions 最小間隔）
                             # 腳本內部 loop 5 次 × 60 秒 = 等效每 1 分鐘查一次
  workflow_dispatch:          # 允許手動觸發

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # 允許 commit state 回 repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Apple Refurb Monitor（每分鐘查一次，連續 5 次）
        env:
          GITHUB_ACTIONS: 'true'
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python apple_refurb_monitor.py --loop 5 --interval 60

      - name: Commit state changes
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add state/
          if git diff --cached --quiet; then
            echo "✅ 無狀態變動，略過 commit"
          else
            git commit -m "chore: update refurb state [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
